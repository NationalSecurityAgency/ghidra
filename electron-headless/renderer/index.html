<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ghidra Headless Project Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <h1>Ghidra Headless</h1>
      </div>
      <div id="health" class="status-pill"></div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="section-head">
          <h2>New Project</h2>
        </div>
        <p class="panel-copy">
          Create a local Ghidra project. Created projects are remembered and shown when you reopen the app.
        </p>
        
        <label class="field">
          <span>Projects Directory</span>
          <div class="inline-field">
            <input
              id="createProjectPath"
              placeholder="/home/user/ghidra-projects"
              autocomplete="off"
            />
            <button id="browseProjectPathBtn" type="button" class="ghost">Browse</button>
          </div>
        </label>
        
        <label class="field">
          <span>Project Name</span>
          <input
            id="createProjectName"
            placeholder="MyProject"
            autocomplete="off"
          />
        </label>
        
        <div class="actions">
          <button id="createProjectBtn" type="button">Create Project</button>
        </div>
        <p id="formMessage" class="form-message" aria-live="polite"></p>
      </aside>

      <section class="main-content">
        <div class="section-head">
          <h2>Recent Projects</h2>
          <button id="refreshProjectsBtn" class="ghost">Refresh</button>
        </div>
        <div id="projectsList" class="project-list"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
