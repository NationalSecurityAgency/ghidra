<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ghidra Headless Project Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <header class="topbar">
      <div>
        <p class="eyebrow">Headless Backend</p>
        <h1>New Project</h1>
      </div>
      <div id="health" class="status-pill"></div>
    </header>

    <main class="layout">
      <section class="panel hero-panel">
        <div class="panel-head">
          <h2>Create Ghidra Project</h2>
          <span class="chip">Minimal Slice</span>
        </div>
        <p class="panel-copy">
          Choose a parent directory, enter a project name, and create a local Ghidra
          project. Created projects are remembered and shown when you reopen the app.
        </p>
        <label class="field">
          <span>Projects Directory</span>
          <div class="inline-field">
            <input
              id="createProjectPath"
              placeholder="/home/user/ghidra-projects"
              autocomplete="off"
            />
            <button id="browseProjectPathBtn" type="button" class="ghost">Browse</button>
          </div>
        </label>
        <label class="field">
          <span>Project Name</span>
          <input
            id="createProjectName"
            placeholder="MyProject"
            autocomplete="off"
          />
        </label>
        <p id="formMessage" class="form-message" aria-live="polite"></p>
        <div class="actions">
          <button id="createProjectBtn" type="button">Create Project</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Remembered Project Locations</h2>
          <div class="actions">
            <button id="refreshProjectsBtn" class="ghost">Refresh</button>
          </div>
        </div>
        <div id="projectsList" class="project-list"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
